<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF5EF;
    --blush:#FFD9E6;
    --pink:#FF8FAE;
    --rose:#DE5179;
    --plum:#4A2E3D;
    --plum-soft:#7A5A6B;
    --lavender:#B9A4DE;
    --gold:#F3C76B;
    --white:#FFFFFF;
    --bezel:#3A2E36;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Quicksand',sans-serif;
    background:
      radial-gradient(circle at 15% 20%, #ffe1ea 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #e7d9fb 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, #ffe8d6 0%, transparent 45%),
      var(--cream);
    overflow:hidden;
    color:var(--plum);
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    position:relative;
  }

  /* ---------- ambient floating decoration ---------- */
  .floaty{
    position:absolute; bottom:-10%; font-size:22px; opacity:.55;
    animation:rise linear infinite; pointer-events:none; user-select:none;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.06));
  }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.5;}
    100%{ transform:translateY(-115vh) rotate(40deg); opacity:0;}
  }

  /* ---------- phone shell ---------- */
  .stage{ position:relative; display:flex; flex-direction:column; align-items:center; gap:14px; z-index:2;}
  .phone-frame{
    position:relative;
    width:300px; height:610px;
    background:var(--bezel);
    border-radius:46px;
    padding:14px;
    box-shadow:0 25px 60px -15px rgba(74,46,61,0.45), 0 0 0 2px rgba(255,255,255,0.06) inset;
  }
  .ears{ position:absolute; top:-16px; left:0; right:0; display:flex; justify-content:center; gap:148px; z-index:1; pointer-events:none;}
  .ear{
    width:34px; height:34px; background:var(--bezel); border-radius:40% 40% 0 0; position:relative; transform:rotate(0deg);
  }
  .ear.l{ border-radius:60% 10% 0 0; transform:rotate(-12deg);}
  .ear.r{ border-radius:10% 60% 0 0; transform:rotate(12deg);}
  .ear::after{
    content:""; position:absolute; inset:7px 7px 0 7px; background:var(--blush); border-radius:60% 10% 0 0;
  }
  .ear.r::after{ border-radius:10% 60% 0 0;}

  .notch{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:90px; height:18px; background:var(--bezel); border-radius:0 0 16px 16px; z-index:5;
  }

  .screen{
    position:relative; width:100%; height:100%;
    background:var(--white);
    border-radius:34px;
    overflow:hidden;
  }

  .page{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    opacity:0;
  }
  .page.active{ display:flex; }
  .page.entering{ animation:fadein .45s ease forwards; }
  @keyframes fadein{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .home-indicator{
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
    width:90px; height:4px; background:rgba(255,255,255,0.4); border-radius:4px; z-index:6;
  }

  /* tap zones for prev/next (avoid covering interactive game area) */
  .tap-zone{ position:absolute; top:0; bottom:60px; width:26%; z-index:4; }
  .tap-zone.left{ left:0; }
  .tap-zone.right{ right:0; }

  /* ---------- PAGE 0 : lock screen ---------- */
  #page0{
    background:linear-gradient(160deg,#3a2e44 0%, #5b3a55 45%, #c9678c 100%);
    color:#fff; align-items:center; justify-content:flex-start; padding-top:64px; text-align:center;
  }
  .lock-date{ font-family:'Fredoka',sans-serif; font-size:13px; letter-spacing:2px; opacity:.85;}
  .lock-time{ font-family:'Fredoka',sans-serif; font-size:58px; font-weight:600; margin:2px 0 18px; }
  .lock-card{
    background:rgba(255,255,255,0.14); backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:18px; padding:12px 16px; margin:0 22px 10px; text-align:left;
    font-size:13.5px; line-height:1.4;
  }
  .lock-card b{ font-family:'Fredoka',sans-serif; font-weight:600; display:block; margin-bottom:2px; font-size:12.5px; color:var(--gold);}
  .lock-bottom{ margin-top:auto; padding-bottom:30px; }
  .chev{ font-size:20px; animation:bounceUp 1.6s ease-in-out infinite; }
  @keyframes bounceUp{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .lock-hint{ font-size:12px; opacity:.85; margin-top:4px; letter-spacing:.5px;}

  /* ---------- PAGE 1 : chat thread ---------- */
  #page1{ background:#FFF8F4; }
  .chat-head{
    display:flex; align-items:center; gap:10px; padding:16px 16px 12px;
    border-bottom:1px solid #FBE3EA; flex-shrink:0;
  }
  .avatar{
    width:38px; height:38px; border-radius:50%; overflow:hidden; flex-shrink:0;
    border:2px solid var(--pink); box-shadow:0 2px 6px rgba(222,81,121,.25);
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .chat-head .name{ font-family:'Fredoka',sans-serif; font-size:15px; font-weight:600; color:var(--rose); }
  .chat-head .status{ font-size:11px; color:var(--plum-soft); margin-top:-2px; }
  .chat-body{ flex:1; overflow-y:auto; padding:14px 14px 6px; display:flex; flex-direction:column; gap:8px;}
  .bubble{
    max-width:78%; padding:9px 13px; border-radius:16px; font-size:13.5px; line-height:1.45;
    align-self:flex-end; background:linear-gradient(135deg,var(--pink),var(--rose)); color:#fff;
    opacity:0; transform:translateY(8px) scale(.96);
    animation:pop .4s ease forwards;
    box-shadow:0 3px 10px rgba(222,81,121,.18);
  }
  .bubble.photo{ padding:6px; background:#fff; border:1px solid #FBE3EA; }
  .bubble.photo img{ width:150px; border-radius:12px; display:block; }
  .bubble.photo .cap{ color:var(--plum-soft); font-size:11.5px; padding:5px 6px 2px; }
  @keyframes pop{ to{opacity:1; transform:translateY(0) scale(1);} }
  .chat-foot{ padding:10px 16px 16px; text-align:center; flex-shrink:0;}

  /* ---------- PAGE 2 : gallery ---------- */
  #page2{ background:#FFF8F4; padding-top:18px; }
  .gal-title{ text-align:center; padding:0 20px; flex-shrink:0;}
  .gal-title h2{ font-family:'Fredoka',sans-serif; color:var(--rose); margin:0; font-size:18px;}
  .gal-title p{ margin:3px 0 10px; font-size:12px; color:var(--plum-soft);}
  .carousel{
    display:flex; gap:14px; overflow-x:auto; scroll-snap-type:x mandatory;
    padding:4px 28px 10px; flex:1; align-items:center;
  }
  .carousel::-webkit-scrollbar{ display:none; }
  .card{
    scroll-snap-align:center; flex-shrink:0; width:172px;
    background:#fff; border-radius:18px; padding:8px 8px 10px;
    box-shadow:0 8px 20px -6px rgba(74,46,61,.18); border:1px solid #FBE3EA;
    text-align:center;
  }
  .card img{ width:100%; height:200px; object-fit:cover; border-radius:13px; display:block; }
  .card p{ font-family:'Caveat',cursive; font-size:16px; margin:7px 2px 1px; color:var(--rose); line-height:1.2;}
  .gal-foot{ text-align:center; font-size:11px; color:var(--plum-soft); padding-bottom:8px; flex-shrink:0;}

  /* ---------- PAGE 3 : do you love me ---------- */
  #page3{ background:linear-gradient(180deg,#FFF1F6,#FDEAFB); align-items:center; justify-content:center; text-align:center; position:relative;}
  .q-eyebrow{ font-size:12px; letter-spacing:1.5px; color:var(--plum-soft); text-transform:uppercase; margin-bottom:6px;}
  .q-title{ font-family:'Fredoka',sans-serif; font-size:24px; color:var(--rose); margin:0 0 28px;}
  .game-area{ position:relative; width:230px; height:120px; }
  .btn{
    font-family:'Fredoka',sans-serif; border:none; border-radius:30px; cursor:pointer;
    font-size:15px; padding:13px 26px; transition:transform .15s ease;
  }
  .btn-yes{
    background:linear-gradient(135deg,var(--pink),var(--rose)); color:#fff;
    box-shadow:0 8px 18px -4px rgba(222,81,121,.5);
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
  }
  .btn-no{
    background:#fff; color:var(--plum-soft); border:1.5px solid #EBD3DC;
    position:absolute; left:50%; top:78px; transform:translateX(-50%);
    font-size:13px; padding:9px 18px;
  }
  .q-reply{ margin-top:18px; font-family:'Caveat',cursive; font-size:19px; color:var(--rose); min-height:24px; }

  /* ---------- PAGE 4 : finale ---------- */
  #page4{
    background:linear-gradient(170deg,#4a2e44,#7a3f63 55%,#de8aa3);
    color:#fff; align-items:center; justify-content:center; text-align:center; padding:26px 22px; position:relative; overflow:hidden;
  }
  .final-eyebrow{ font-size:11px; letter-spacing:3px; opacity:.8; text-transform:uppercase;}
  .final-title{ font-family:'Fredoka',sans-serif; font-size:25px; line-height:1.15; margin:8px 0 16px;
    background:linear-gradient(90deg,#fff,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .final-frame{
    width:108px; height:108px; border-radius:50%; overflow:hidden; margin:0 auto 16px;
    border:3px solid var(--gold); box-shadow:0 0 0 6px rgba(255,255,255,0.12);
  }
  .final-frame img{ width:100%; height:100%; object-fit:cover; }
  .final-text{ font-size:13px; line-height:1.6; opacity:.95; max-width:230px; margin:0 auto;}
  .final-sign{ font-family:'Caveat',cursive; font-size:23px; margin-top:14px; color:var(--gold);}
  .replay{
    margin-top:18px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4);
    color:#fff; font-family:'Quicksand',sans-serif; font-size:11.5px; padding:7px 16px; border-radius:20px; cursor:pointer;
  }
  #confetti-canvas{ position:absolute; inset:0; pointer-events:none; z-index:3;}

  /* ---------- dots & nav ---------- */
  .dots{ display:flex; gap:7px; }
  .dot{ width:7px; height:7px; border-radius:50%; background:#E8C7D2; cursor:pointer; transition:.25s; }
  .dot.active{ background:var(--rose); width:18px; border-radius:5px; }
  .swipe-hint{ font-size:11px; color:var(--plum-soft); letter-spacing:.5px; }

  @media (prefers-reduced-motion: reduce){
    .floaty, .chev, .bubble{ animation:none !important; }
  }
</style>
</head>
